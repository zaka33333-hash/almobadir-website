<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<title>الصفحة غير موجودة · المبادر</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,follow">
<link rel="icon" type="image/svg+xml" href="/assets/logo/favicon.svg">
<link rel="stylesheet" href="/assets/tokens.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Almarai:wght@400;700;800;900&family=Tajawal:wght@400;500;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<script defer data-domain="almobadir.com" src="https://plausible.io/js/script.outbound-links.tagged-events.js"></script>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100dvh; }
  body {
    background: var(--void);
    color: var(--ink);
    font-family: var(--font-ar-body);
    display: grid; grid-template-rows: auto 1fr auto;
    overflow: hidden;
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 70% 60% at 78% 38%, rgba(230,33,59,0.18), transparent 62%),
      radial-gradient(ellipse 70% 80% at 18% 78%, rgba(31,163,122,0.08), transparent 58%);
    pointer-events: none;
  }
  body::after {
    content: ''; position: fixed; inset: 0; pointer-events: none;
    background-image:
      linear-gradient(rgba(245,234,210,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(245,234,210,0.04) 1px, transparent 1px);
    background-size: 80px 80px;
    mask-image: linear-gradient(135deg, rgba(0,0,0,1) 30%, rgba(0,0,0,0.2));
  }
  a { color: inherit; text-decoration: none; }
  ::selection { background: color-mix(in srgb, var(--crimson) 38%, transparent); color: var(--ink); }

  .top { position: relative; z-index: 2; display: flex; align-items: center; justify-content: space-between; padding: 22px clamp(20px, 4vw, 48px); border-bottom: 1px solid var(--hairline); }
  .top-mark { display: inline-flex; align-items: center; gap: 12px; font-family: var(--font-ar-display); font-weight: 800; font-size: 18px; letter-spacing: -0.01em; }
  .top-mark svg { width: 26px; height: 26px; color: var(--crimson); }
  .top-meta { font: 500 11px/1 var(--font-mono); letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-mute); }

  main { position: relative; z-index: 2; display: grid; place-items: center; padding: clamp(20px, 4vh, 60px) clamp(20px, 4vw, 48px); }
  .card { max-width: 640px; text-align: center; }

  .four {
    font-family: var(--font-ar-display);
    font-weight: 900;
    font-size: clamp(120px, 20vw, 220px);
    line-height: 0.9;
    letter-spacing: -0.04em;
    margin: 0 0 8px;
    color: transparent;
    background: linear-gradient(180deg, #FF324A 0%, #E6213B 55%, #6E0F1F 100%);
    -webkit-background-clip: text;
            background-clip: text;
    text-shadow: 0 24px 96px rgba(230,33,59,0.32);
  }
  .four-meta {
    font: 500 12px/1 var(--font-mono); letter-spacing: 0.22em;
    text-transform: uppercase; color: var(--ink-mute);
    margin: 0 0 28px;
  }

  h1 {
    font-family: var(--font-ar-display);
    font-size: clamp(28px, 4vw, 48px);
    line-height: 1.1; letter-spacing: -0.018em;
    margin: 0 0 14px;
  }
  h1 em { font-style: normal; color: var(--crimson); }
  .lede {
    font-size: clamp(15px, 1.4vw, 17px);
    line-height: 1.65;
    color: var(--ink-soft);
    margin: 0 auto 32px; max-width: 44ch;
  }

  .actions { display: inline-flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 12px 20px;
    border: 1px solid var(--hairline-strong);
    border-radius: 999px;
    font-size: 13px; font-weight: 600;
    transition: border-color 0.3s var(--ease-glide), background 0.3s var(--ease-glide), transform 0.3s var(--ease-glide);
  }
  .btn:hover {
    border-color: var(--crimson);
    background: color-mix(in srgb, var(--crimson) 12%, transparent);
    transform: translateY(-1px);
  }
  .btn--primary {
    background: var(--crimson); border-color: var(--crimson); color: var(--ink);
  }
  .btn--primary:hover { background: var(--crimson-2); border-color: var(--crimson-2); }

  .lang { margin-top: 22px; font: 500 12px/1 var(--font-mono); letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-mute); }
  .lang a { color: var(--crimson); border-bottom: 1px solid color-mix(in srgb, var(--crimson) 50%, transparent); padding-bottom: 2px; }

  footer { position: relative; z-index: 2; padding: 18px clamp(20px, 4vw, 48px); border-top: 1px solid var(--hairline); display: flex; justify-content: space-between; gap: 14px; flex-wrap: wrap; font: 500 11px/1.4 var(--font-mono); letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-mute); }
  footer a { color: var(--ink-soft); }
  footer a:hover { color: var(--ink); }
</style>
</head>
<body>

<header class="top">
  <a class="top-mark" href="/">
    <svg viewBox="0 0 32 32" aria-hidden="true"><path d="M16 2L3 9v14l13 7 13-7V9L16 2z" fill="none" stroke="currentColor" stroke-width="1.6"/><circle cx="16" cy="16" r="2.4" fill="currentColor"/></svg>
    <span>المبادر</span>
  </a>
  <span class="top-meta">404 · NOT FOUND</span>
</header>

<main>
  <article class="card">
    <h2 class="four" aria-hidden="true">404</h2>
    <p class="four-meta">PAGE · غير موجودة</p>

    <h1>الصفحة <em>تاهت</em>.</h1>
    <p class="lede">الرابط الذي اتبعته إمّا تغيّر، أو لم يكن موجوداً أصلاً. لا مشكلة — لنعد إلى الطريق.</p>

    <div class="actions">
      <a class="btn btn--primary" href="/">
        <span aria-hidden="true">←</span>
        <span>الصفحة الرئيسية</span>
      </a>
      <a class="btn" href="/#network">
        <span>الشبكة</span>
        <span aria-hidden="true">←</span>
      </a>
      <a class="btn" href="/#newsletter">
        <span>اشترك في النشرة</span>
        <span aria-hidden="true">←</span>
      </a>
    </div>

    <p class="lang">
      Looking for the English page? <a href="/en/">Go to /en/</a>
    </p>
  </article>
</main>

<footer>
  <span>© 2026 ALMOBADIR</span>
  <span><a href="/privacy/">الخصوصية</a> · <a href="/terms/">الشروط</a></span>
</footer>

</body>
</html>
