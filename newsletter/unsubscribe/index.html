<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<title>إلغاء الاشتراك · نشرة المبادر</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="description" content="إلغاء الاشتراك من نشرة المبادر الأسبوعية.">
<meta name="robots" content="noindex,follow">
<link rel="canonical" href="https://almobadir.com/newsletter/unsubscribe/">
<link rel="alternate" hreflang="ar" href="https://almobadir.com/newsletter/unsubscribe/">
<link rel="alternate" hreflang="en" href="https://almobadir.com/en/newsletter/unsubscribe/">
<link rel="icon" type="image/svg+xml" href="../../assets/logo/favicon.svg">
<link rel="stylesheet" href="../../assets/tokens.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Almarai:wght@400;700;800&family=Tajawal:wght@400;500;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  body { margin: 0; min-height: 100dvh; background: var(--void); color: var(--ink); font-family: var(--font-ar-body); display: grid; grid-template-rows: auto 1fr auto; }
  a { color: inherit; text-decoration: none; }
  ::selection { background: color-mix(in srgb, var(--crimson) 38%, transparent); color: var(--ink); }
  .top { display: flex; align-items: center; justify-content: space-between; padding: 22px clamp(20px, 4vw, 48px); border-bottom: 1px solid var(--hairline); }
  .top-mark { display: inline-flex; align-items: center; gap: 12px; font-family: var(--font-ar-display); font-weight: 800; font-size: 18px; letter-spacing: -0.01em; }
  .top-mark svg { width: 26px; height: 26px; color: var(--crimson); }
  .top-meta { font: 500 11px/1 var(--font-mono); letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-mute); }
  main { display: grid; place-items: center; padding: clamp(40px, 8vh, 96px) clamp(20px, 4vw, 48px); }
  .card { max-width: 540px; text-align: center; }
  h1 { font-family: var(--font-ar-display); font-size: clamp(28px, 4vw, 48px); line-height: 1.1; letter-spacing: -0.018em; margin: 0 0 14px; }
  .lede { font-size: clamp(15px, 1.4vw, 17px); line-height: 1.65; color: var(--ink-soft); margin: 0 auto 28px; max-width: 44ch; }
  form#u { display: grid; grid-template-columns: 1fr auto; gap: 8px; padding: 6px; background: rgba(245,234,210,0.03); border: 1px solid var(--hairline); border-radius: 999px; max-width: 460px; margin: 0 auto 18px; }
  form#u input { background: transparent; border: 0; outline: 0; padding: 14px 18px; color: var(--ink); font: 500 14.5px/1.3 var(--font-ar-body); }
  form#u input::placeholder { color: var(--ink-mute); }
  form#u button { border: 0; padding: 0 22px; height: 48px; border-radius: 999px; background: var(--crimson); color: var(--ink); font: 600 13px/1 var(--font-ar-body); cursor: pointer; transition: background 0.3s var(--ease-glide); }
  form#u button:hover { background: var(--crimson-2); }
  .status { margin: 18px auto 0; max-width: 460px; padding: 14px 18px; border-radius: var(--r-lg); border: 1px solid var(--hairline); background: var(--void-2); font-size: 13px; line-height: 1.6; color: var(--ink-soft); display: none; }
  .status[data-kind="success"] { display: block; border-color: color-mix(in srgb, var(--verde) 38%, transparent); color: var(--verde); }
  .status[data-kind="error"]   { display: block; border-color: color-mix(in srgb, var(--crimson) 38%, transparent); color: var(--crimson); }
  .status .email-mark { font-weight: 700; }
  .status .footnote { display: block; margin-top: 6px; font-weight: 400; opacity: 0.8; font-size: 12px; }
  .resub { margin-top: 24px; }
  .resub-link { font: 500 12.5px/1 var(--font-mono); letter-spacing: 0.12em; text-transform: uppercase; color: var(--crimson); border-bottom: 1px solid color-mix(in srgb, var(--crimson) 50%, transparent); padding-bottom: 2px; }
  .resub-link:hover { color: var(--crimson-2); border-color: var(--crimson-2); }
  .home { display: inline-flex; align-items: center; gap: 8px; margin-top: 32px; padding: 12px 20px; border: 1px solid var(--hairline-strong); border-radius: 999px; font-size: 13px; transition: border-color 0.3s var(--ease-glide), background 0.3s var(--ease-glide); }
  .home:hover { border-color: var(--crimson); background: color-mix(in srgb, var(--crimson) 8%, transparent); }
  footer { padding: 18px clamp(20px, 4vw, 48px); border-top: 1px solid var(--hairline); font: 500 11px/1.4 var(--font-mono); letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-mute); text-align: center; }
</style>
</head>
<body>

<header class="top">
  <a class="top-mark" href="../../">
    <svg viewBox="0 0 32 32" aria-hidden="true"><path d="M16 2L3 9v14l13 7 13-7V9L16 2z" fill="none" stroke="currentColor" stroke-width="1.6"/><circle cx="16" cy="16" r="2.4" fill="currentColor"/></svg>
    <span>المبادر</span>
  </a>
  <span class="top-meta">UNSUBSCRIBE</span>
</header>

<main>
  <article class="card">
    <h1>إلغاء الاشتراك</h1>
    <p class="lede">
      أدخل بريدك الإلكتروني لإزالته من قائمة نشرة المبادر.
      الإلغاء فوري — لن نراسلك مجدداً.
    </p>

    <form id="u" novalidate>
      <input id="u-email" type="email" inputmode="email" autocomplete="email" required dir="ltr" placeholder="name@example.com">
      <button type="submit">إلغاء الاشتراك</button>
    </form>
    <p class="status" id="u-status" role="status" aria-live="polite"></p>

    <p class="resub">
      غيّرت رأيك؟ <a class="resub-link" href="../../#newsletter">عُد للاشتراك</a>
    </p>

    <a class="home" href="../../">
      <span>العودة إلى الصفحة الرئيسية</span>
      <span aria-hidden="true">←</span>
    </a>
  </article>
</main>

<footer>© 2026 ALMOBADIR · RIYADH</footer>

<script src="../../assets/newsletter.js?v=1" defer></script>
<script>
  document.addEventListener('DOMContentLoaded', function () {
    var form = document.getElementById('u');
    var input = document.getElementById('u-email');
    var status = document.getElementById('u-status');
    var NL = window.AlmobadirNewsletter;
    if (NL && NL.isSubscribed()) input.value = NL.isSubscribed();

    function setStatus(kind, ...nodes) {
      // Safe DOM construction — never use innerHTML with user-provided text.
      while (status.firstChild) status.removeChild(status.firstChild);
      status.dataset.kind = kind;
      nodes.forEach(function (n) { status.appendChild(n); });
    }

    form.addEventListener('submit', function (e) {
      e.preventDefault();
      var email = (input.value || '').trim().toLowerCase();
      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        setStatus('error', document.createTextNode('يرجى إدخال بريد إلكتروني صحيح.'));
        input.focus();
        return;
      }
      if (NL) NL.clear();
      var emailMark = document.createElement('strong');
      emailMark.className = 'email-mark';
      emailMark.textContent = email; // safe: text node, no HTML parse
      var foot = document.createElement('small');
      foot.className = 'footnote';
      foot.textContent = 'إذا كان البريد مسجَّل في خادم النشرة، فقد ترسل ESP رسالة تأكيد إلغاء.';
      setStatus('success',
        document.createTextNode('تم إلغاء اشتراك '),
        emailMark,
        document.createTextNode('. لن تصلك النشرة بعد الآن.'),
        foot
      );
    });
  });
</script>

</body>
</html>
